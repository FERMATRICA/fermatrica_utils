- description: na_0 fills nan in pattern-matching column with 0.0 non-matching left unchanged testing case 0
  params:
    ds: !pd.DataFrame
      data:
        spend: [1.0, null, 3.0]
        other: [10.0, null, 30.0]
    ptrn: spend
  exp_err: False
  expected_result: !pd.DataFrame
    data:
      spend: [1.0, 0.0, 3.0]
      other: [10.0, null, 30.0]

- description: na_0 no matching column dataframe unchanged testing case 1
  params:
    ds: !pd.DataFrame
      data:
        a: [1.0, null, 3.0]
    ptrn: "^x$"
  exp_err: False
  expected_result: !pd.DataFrame
    data:
      a: [1.0, null, 3.0]

- description: na_0 custom replace_val fills with non-zero testing case 2
  params:
    ds: !pd.DataFrame
      data:
        val: [1.0, null, 3.0]
    ptrn: val
    replace_val: -1.0
  exp_err: False
  expected_result: !pd.DataFrame
    data:
      val: [1.0, -1.0, 3.0]

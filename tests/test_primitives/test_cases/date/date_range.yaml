- description: date_range weekly range testing case 0
  params:
    start_date: '2024-01-01'
    end_date: '2024-01-15'
    period: 'week'
  exp_err: False
  expected_result:
    - !pd.Timestamp '2024-01-01'
    - !pd.Timestamp '2024-01-08'
    - !pd.Timestamp '2024-01-15'


- description: date_to_period daily period floors time component testing case 0
  params:
    sr: !pd.DatetimeSeries
      data: ['2024-01-15 12:00:00']
    period: 'day'
  exp_err: False
  expected_result: !pd.DatetimeSeries
    data: ['2024-01-15']

